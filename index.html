<!DOCTYPE html>
<html>
<head>
  <title>AI Motion Runner Stable</title>

  <style>
    body {
      margin: 0;
      display: flex;
      overflow: hidden;
      font-family: Arial;
      background: black;
      color: white;
    }

    /* GAME */
    #gameArea {
      width: 65%;
      height: 100vh;
      position: relative;
      background: #111;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* CAMERA */
    #camArea {
      width: 35%;
      height: 100vh;
      position: relative;
      border-left: 2px solid #222;
      background: black;
    }

    video {
      display: none;
    }

    #camCanvas {
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<!-- ================= GAME ================= -->
<div id="gameArea">
  <div id="ui">STATE: IDLE</div>
  <canvas id="game"></canvas>
</div>

<!-- ================= CAMERA ================= -->
<div id="camArea">
  <video id="video" autoplay playsinline></video>
  <canvas id="camCanvas"></canvas>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

//////////////////////////////
// GAME SETUP
//////////////////////////////
const g = document.getElementById("game");
const gctx = g.getContext("2d");

g.width = window.innerWidth * 0.65;
g.height = window.innerHeight;

let player = {
  lane: 1,
  y: g.height - 140,
  jumping: false
};

const lanes = [
  g.width / 3,
  g.width / 2,
  g.width * 2 / 3
];

function drawGame(){
  gctx.clearRect(0,0,g.width,g.height);

  // ground
  gctx.strokeStyle = "#444";
  gctx.beginPath();
  gctx.moveTo(0, g.height - 100);
  gctx.lineTo(g.width, g.height - 100);
  gctx.stroke();

  // player
  gctx.fillStyle = "lime";
  gctx.beginPath();
  gctx.arc(lanes[player.lane], player.y, 25, 0, Math.PI*2);
  gctx.fill();

  requestAnimationFrame(drawGame);
}

drawGame();

//////////////////////////////
// STATE MACHINE
//////////////////////////////
let state = "IDLE";
let lastUpdate = 0;

function setState(newState){
  if(state === newState) return;

  state = newState;
  document.getElementById("ui").innerText = "STATE: " + state;

  // auto reset idle after 300ms
  setTimeout(()=>{
    state = "IDLE";
    document.getElementById("ui").innerText = "STATE: IDLE";
  },300);
}

//////////////////////////////
// CAMERA
//////////////////////////////
const video = document.getElementById("video");
const camCanvas = document.getElementById("camCanvas");
const cctx = camCanvas.getContext("2d");

camCanvas.width = window.innerWidth * 0.35;
camCanvas.height = window.innerHeight;

// draw camera frame
function drawCam(){
  cctx.save();
  cctx.translate(camCanvas.width,0);
  cctx.scale(-1,1);
  cctx.drawImage(video,0,0,camCanvas.width,camCanvas.height);
  cctx.restore();
}

// draw skeleton points
function drawPoints(lm){
  cctx.fillStyle = "red";
  [11,12,0].forEach(i=>{
    let p = lm[i];
    cctx.beginPath();
    cctx.arc(p.x*camCanvas.width,p.y*camCanvas.height,6,0,Math.PI*2);
    cctx.fill();
  });
}

//////////////////////////////
// TRACK LOGIC (FIXED)
//////////////////////////////
let lastTrack = 0;

function onResults(res){
  if(!res.poseLandmarks) return;

  const now = Date.now();
  if(now - lastTrack < 200) return;
  lastTrack = now;

  const lm = res.poseLandmarks;

  drawCam();
  drawPoints(lm);

  const left = lm[11];
  const right = lm[12];
  const nose = lm[0];

  // ===== FIXED LOGIC =====
  const diff = left.x - right.x;
  const DEADZONE = 0.06;

  let newState = "IDLE";

  // jump priority
  if(nose.y < 0.35){
    newState = "JUMP";
  }
  else if(diff > DEADZONE){
    newState = "LEFT";
  }
  else if(diff < -DEADZONE){
    newState = "RIGHT";
  }
  else{
    newState = "IDLE";
  }

  setState(newState);

  // game actions
  if(newState === "LEFT") player.lane = 0;
  if(newState === "RIGHT") player.lane = 2;
  if(newState === "IDLE") player.lane = 1;

  if(newState === "JUMP" && !player.jumping){
    player.jumping = true;
    player.y -= 120;

    setTimeout(()=>{
      player.y = g.height - 140;
      player.jumping = false;
    },450);
  }
}

//////////////////////////////
// MEDIA PIPE
//////////////////////////////
const pose = new Pose({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

pose.onResults(onResults);

const camera = new Camera(video,{
  onFrame: async ()=>{
    await pose.send({image:video});
  },
  width:640,
  height:480
});

camera.start();

</script>

</body>
</html>
