<!DOCTYPE html>
<html>
<head>
  <title>Motion Runner Demo FIX</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; color: white; font-family: Arial; }
    canvas { position: absolute; top: 0; left: 0; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div id="ui">Move: LEFT / RIGHT / JUMP</div>
  <video id="video" style="display:none;"></video>
  <canvas id="game"></canvas>

  <!-- ✅ FIX: load FULL mediapipe pose -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

  <script>
    const videoElement = document.getElementById('video');
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // ================= GAME STATE =================
    let player = {
      lane: 1,
      y: canvas.height - 150,
      jumping: false
    };

    const laneX = [
      canvas.width/3,
      canvas.width/2,
      canvas.width*2/3
    ];

    // ================= RENDER LOOP =================
    function updateGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // ground
      ctx.strokeStyle = "#444";
      ctx.beginPath();
      ctx.moveTo(0, canvas.height - 100);
      ctx.lineTo(canvas.width, canvas.height - 100);
      ctx.stroke();

      // player
      ctx.fillStyle = "lime";
      ctx.beginPath();
      ctx.arc(laneX[player.lane], player.y, 25, 0, Math.PI * 2);
      ctx.fill();

      requestAnimationFrame(updateGame);
    }
    updateGame();

    // ================= MOTION LOGIC =================
    function onResults(results) {
      if (!results.poseLandmarks) return;

      const lm = results.poseLandmarks;

      const leftShoulder = lm[11];
      const rightShoulder = lm[12];
      const nose = lm[0];

      const shoulderDiff = leftShoulder.x - rightShoulder.x;

      // ===== LEFT / RIGHT (FIXED THRESHOLD) =====
      if (shoulderDiff > 0.12) player.lane = 0;
      else if (shoulderDiff < -0.12) player.lane = 2;
      else player.lane = 1;

      // ===== JUMP (FIXED LOGIC) =====
      if (nose.y < 0.28 && !player.jumping) {
        player.jumping = true;
        player.y -= 120;

        setTimeout(() => {
          player.y = canvas.height - 150;
          player.jumping = false;
        }, 500);
      }
    }

    // ================= MEDIAPIPE INIT FIX =================
    const pose = new Pose({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
      }
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults(onResults);

    // ================= CAMERA FIX (NO CameraUtils) =================
    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });

      videoElement.srcObject = stream;
      await videoElement.play();

      // frame loop → GUARANTEED WORK
      function loop() {
        pose.send({ image: videoElement });
        requestAnimationFrame(loop);
      }
      loop();
    }

    startCamera();
  </script>
</body>
</html>
