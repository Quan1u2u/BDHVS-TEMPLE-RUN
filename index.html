<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>AI Motion Runner FIX</title>

<style>
body {
  margin: 0;
  display: flex;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

#game {
  width: 65%;
  height: 100vh;
  background: #111;
}

#cam {
  width: 35%;
  height: 100vh;
  position: relative;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  transform: scaleX(-1);
  object-fit: cover;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#state {
  position: absolute;
  bottom: 10px;
  left: 10px;
  color: white;
  background: rgba(0,0,0,0.6);
  padding: 10px;
}
</style>
</head>

<body>

<div id="game">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="cam">
  <video id="video" autoplay playsinline></video>
  <canvas id="overlay"></canvas>
  <div id="state">STATE: IDLE</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
// ================= GAME =================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth * 0.65;
canvas.height = window.innerHeight;

let player = { x: canvas.width/2, lane:1, y:canvas.height-120, jump:0 };

const lanes = [
  canvas.width * 0.3,
  canvas.width * 0.5,
  canvas.width * 0.7
];

// ================= CAMERA FIX =================
const video = document.getElementById("video");

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  });

  video.srcObject = stream;
  await video.play();
}
startCamera();

// ================= MEDIAPIPE =================
const pose = new Pose.Pose({
  locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

// ================= STATE =================
let state = "IDLE";
let history = [];

// smoothing
let ema = { nose:0 };
const alpha = 0.2;
let base = null;

// ================= MAIN LOOP =================
async function detect() {
  if (video.readyState >= 2) {
    await pose.send({ image: video });
  }
  requestAnimationFrame(detect);
}
detect();

// ================= RESULTS =================
pose.onResults(results => {
  if (!results.poseLandmarks) return;

  const lm = results.poseLandmarks;
  const nose = lm[0];
  const l = lm[11];
  const r = lm[12];

  if (!base) base = nose.x;

  let offset = nose.x - base;

  // EMA smoothing
  ema.nose = alpha * offset + (1 - alpha) * ema.nose;

  const DEAD = 0.07;
  let newState = "IDLE";

  if (Math.abs(ema.nose) < DEAD) newState = "IDLE";
  else if (ema.nose < -DEAD) newState = "LEFT";
  else if (ema.nose > DEAD) newState = "RIGHT";

  // jump heuristic
  if (Math.abs(l.y - r.y) < 0.02) newState = "JUMP";

  history.push(newState);
  if (history.length > 5) history.shift();

  state = majority(history);

  document.getElementById("state").innerText = "STATE: " + state;

  draw(lm);
});

// ================= DRAW =================
function draw(lm) {
  const c = document.getElementById("overlay");
  c.width = video.videoWidth;
  c.height = video.videoHeight;
  const cctx = c.getContext("2d");

  cctx.clearRect(0,0,c.width,c.height);

  drawPoint(cctx, lm[0]);
  drawPoint(cctx, lm[11]);
  drawPoint(cctx, lm[12]);
}

function drawPoint(ctx,p){
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(p.x*video.videoWidth, p.y*video.videoHeight,6,0,Math.PI*2);
  ctx.fill();
}

// ================= MAJORITY =================
function majority(arr){
  const map={};
  let best="IDLE", max=0;
  for(let x of arr){
    map[x]=(map[x]||0)+1;
    if(map[x]>max){max=map[x];best=x;}
  }
  return best;
}

// ================= GAME LOOP =================
function loop(){
  if(state==="LEFT") player.lane=0;
  if(state==="RIGHT") player.lane=2;
  if(state==="IDLE") player.lane=1;

  player.x += (lanes[player.lane]-player.x)*0.15;

  if(state==="JUMP") player.jump=60;
  else player.jump*=0.9;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#222";
  for(let i=1;i<3;i++){
    ctx.fillRect(canvas.width*i/3,0,2,canvas.height);
  }

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x, player.y-player.jump,30,0,Math.PI*2);
  ctx.fill();

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
