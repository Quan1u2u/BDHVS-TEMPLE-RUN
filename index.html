<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AI Motion Runner Dashboard</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    display: flex;
    background: #0f0f0f;
    font-family: Arial;
  }

  #gameContainer {
    width: 65%;
    height: 100vh;
    background: #111;
  }

  #cameraContainer {
    width: 35%;
    height: 100vh;
    position: relative;
    background: #000;
  }

  canvas {
    display: block;
  }

  #video {
    position: absolute;
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
    object-fit: cover;
  }

  #overlay {
    position: absolute;
    top: 0;
    left: 0;
  }

  #stateBox {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: white;
    font-size: 20px;
    background: rgba(0,0,0,0.5);
    padding: 10px;
  }
</style>

</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="cameraContainer">
  <video id="video" autoplay></video>
  <canvas id="overlay"></canvas>
  <div id="stateBox">STATE: IDLE</div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
// ==========================
// GAME SETUP
// ==========================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth * 0.65;
canvas.height = window.innerHeight;

let player = {
  lane: 1,
  x: canvas.width / 2,
  y: canvas.height - 120,
  targetX: canvas.width / 2,
  jumping: false,
  jumpY: 0
};

const lanes = [
  canvas.width * 0.3,
  canvas.width * 0.5,
  canvas.width * 0.7
];

// ==========================
// STATE MACHINE
// ==========================
let currentState = "IDLE";
let history = [];

// ==========================
// SMOOTHING
// ==========================
let ema = { left: 0, right: 0, nose: 0 };
const alpha = 0.2;

// ==========================
// SINGLE PERSON LOCK
// ==========================
let locked = false;
let baseNose = null;

// ==========================
// CAMERA
// ==========================
const videoElement = document.getElementById("video");

// ==========================
// MEDIAPIPE POSE
// ==========================
const pose = new Pose.Pose({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

pose.onResults(onResults);

// ==========================
// CAMERA START
// ==========================
const camera = new Camera.Camera(videoElement, {
  onFrame: async () => {
    await pose.send({ image: videoElement });
  },
  width: 640,
  height: 480
});

camera.start();

// ==========================
// RESULTS PROCESSING
// ==========================
function onResults(results) {
  const canvasOverlay = document.getElementById("overlay");
  canvasOverlay.width = videoElement.videoWidth;
  canvasOverlay.height = videoElement.videoHeight;

  const ctx2 = canvasOverlay.getContext("2d");
  ctx2.clearRect(0, 0, canvasOverlay.width, canvasOverlay.height);

  if (!results.poseLandmarks) return;

  const lm = results.poseLandmarks;

  const nose = lm[0];
  const leftShoulder = lm[11];
  const rightShoulder = lm[12];

  // ==========================
  // SINGLE PERSON LOCK
  // ==========================
  if (!locked) {
    baseNose = nose.x;
    locked = true;
  }

  const noseOffset = nose.x - baseNose;

  // ==========================
  // EMA SMOOTHING
  // ==========================
  ema.left = alpha * leftShoulder.x + (1 - alpha) * ema.left;
  ema.right = alpha * rightShoulder.x + (1 - alpha) * ema.right;
  ema.nose = alpha * noseOffset + (1 - alpha) * ema.nose;

  const shoulderDiff = ema.right - ema.left;
  const offset = ema.nose;

  // ==========================
  // CLASSIFICATION
  // ==========================
  let state = "IDLE";

  const DEADZONE = 0.07;

  if (Math.abs(offset) < DEADZONE) {
    state = "IDLE";
  } else if (offset < -DEADZONE) {
    state = "LEFT";
  } else if (offset > DEADZONE) {
    state = "RIGHT";
  }

  // SIMPLE JUMP (both shoulders high heuristic)
  if (Math.abs(leftShoulder.y - rightShoulder.y) < 0.02) {
    state = "JUMP";
  }

  // ==========================
  // HISTORY VOTING
  // ==========================
  history.push(state);
  if (history.length > 5) history.shift();

  const finalState = mode(history);

  currentState = finalState;
  document.getElementById("stateBox").innerText = "STATE: " + currentState;

  // ==========================
  // DRAW SKELETON
  // ==========================
  drawPoint(ctx2, nose);
  drawPoint(ctx2, leftShoulder);
  drawPoint(ctx2, rightShoulder);
}

function drawPoint(ctx, p) {
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(p.x * 640, p.y * 480, 6, 0, Math.PI * 2);
  ctx.fill();
}

// ==========================
// MODE (MAJORITY VOTE)
// ==========================
function mode(arr) {
  const freq = {};
  let max = 0;
  let res = "IDLE";

  for (let v of arr) {
    freq[v] = (freq[v] || 0) + 1;
    if (freq[v] > max) {
      max = freq[v];
      res = v;
    }
  }
  return res;
}

// ==========================
// GAME LOOP
// ==========================
function updateGame() {
  // lane control
  if (currentState === "LEFT") player.lane = 0;
  if (currentState === "RIGHT") player.lane = 2;
  if (currentState === "IDLE") player.lane = 1;

  // jump
  if (currentState === "JUMP" && !player.jumping) {
    player.jumping = true;
    player.jumpY = 80;
    setTimeout(() => {
      player.jumping = false;
      player.jumpY = 0;
    }, 500);
  }

  player.targetX = lanes[player.lane];

  // smooth movement
  player.x += (player.targetX - player.x) * 0.15;
}

function drawGame() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // lanes
  ctx.strokeStyle = "#333";
  for (let i = 1; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(canvas.width * (i / 3), 0);
    ctx.lineTo(canvas.width * (i / 3), canvas.height);
    ctx.stroke();
  }

  // player
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.arc(player.x, player.y - player.jumpY, 30, 0, Math.PI * 2);
  ctx.fill();
}

function loop() {
  updateGame();
  drawGame();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
