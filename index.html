<!DOCTYPE html>
<html>
<head>
  <title>AI Body Controller Dashboard</title>

  <style>
    body {
      margin: 0;
      display: flex;
      background: #0f0f0f;
      font-family: Arial;
      color: white;
    }

    #game {
      width: 65%;
      height: 100vh;
      position: relative;
      background: #111;
    }

    #panel {
      width: 35%;
      height: 100vh;
      position: relative;
      border-left: 2px solid #222;
      background: black;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    video {
      display: none;
    }

    #stateBox {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- GAME -->
<div id="game">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- AI PANEL -->
<div id="panel">
  <video id="video" autoplay playsinline></video>
  <canvas id="camCanvas"></canvas>
  <div id="stateBox">STATE: IDLE</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

/////////////////////////////
// GAME SETUP
/////////////////////////////
const g = document.getElementById("gameCanvas");
const gctx = g.getContext("2d");

g.width = window.innerWidth * 0.65;
g.height = window.innerHeight;

let player = { lane: 1, y: g.height - 120 };

const lanes = [
  g.width / 3,
  g.width / 2,
  g.width * 2 / 3
];

function drawGame() {
  gctx.clearRect(0,0,g.width,g.height);

  gctx.fillStyle = "lime";
  gctx.beginPath();
  gctx.arc(lanes[player.lane], player.y, 25, 0, Math.PI*2);
  gctx.fill();

  requestAnimationFrame(drawGame);
}
drawGame();

/////////////////////////////
// AI STATE MACHINE
/////////////////////////////
let state = "IDLE";
let lastStateTime = 0;

function setState(newState) {
  state = newState;
  lastStateTime = Date.now();
  document.getElementById("stateBox").innerText = "STATE: " + state;

  // auto reset về idle
  setTimeout(() => {
    if (Date.now() - lastStateTime >= 300) {
      state = "IDLE";
      document.getElementById("stateBox").innerText = "STATE: IDLE";
    }
  }, 300);
}

/////////////////////////////
// CAMERA PANEL
/////////////////////////////
const video = document.getElementById("video");
const camCanvas = document.getElementById("camCanvas");
const cctx = camCanvas.getContext("2d");

camCanvas.width = window.innerWidth * 0.35;
camCanvas.height = window.innerHeight;

function drawCameraFrame() {
  cctx.save();
  cctx.translate(camCanvas.width, 0);
  cctx.scale(-1,1);
  cctx.drawImage(video,0,0,camCanvas.width,camCanvas.height);
  cctx.restore();
}

function drawSkeleton(lm) {
  cctx.fillStyle = "red";
  [11,12,0].forEach(i=>{
    let p = lm[i];
    cctx.beginPath();
    cctx.arc(p.x*camCanvas.width,p.y*camCanvas.height,6,0,Math.PI*2);
    cctx.fill();
  });
}

/////////////////////////////
// POSE TRACKING
/////////////////////////////
let lastTrack = 0;

function onResults(res){
  if(!res.poseLandmarks) return;

  const now = Date.now();
  if(now - lastTrack < 200) return;
  lastTrack = now;

  const lm = res.poseLandmarks;

  drawCameraFrame();
  drawSkeleton(lm);

  const left = lm[11];
  const right = lm[12];
  const nose = lm[0];

  const diff = left.x - right.x;

  // CLASSIFY ACTION
  if(diff > 0.12){
    setState("LEFT");
    player.lane = 0;
  }
  else if(diff < -0.12){
    setState("RIGHT");
    player.lane = 2;
  }
  else if(nose.y < 0.35){
    setState("JUMP");
  }
  else {
    setState("IDLE");
    player.lane = 1;
  }
}

/////////////////////////////
// MEDIA PIPE
/////////////////////////////
const pose = new Pose({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

pose.onResults(onResults);

const camera = new Camera(video,{
  onFrame: async ()=>{
    await pose.send({image:video});
  },
  width:640,
  height:480
});

camera.start();

</script>

</body>
</html>
