<!DOCTYPE html>
<html>
<head>
  <title>Motion Runner AI Stable Final</title>

  <style>
    body {
      margin: 0;
      display: flex;
      overflow: hidden;
      background: black;
      font-family: Arial;
      color: white;
    }

    /* GAME */
    #gameArea {
      width: 65%;
      height: 100vh;
      position: relative;
      background: #111;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* CAMERA */
    #camArea {
      width: 35%;
      height: 100vh;
      position: relative;
      border-left: 2px solid #222;
      background: black;
    }

    video {
      display: none;
    }

    #camCanvas {
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>

<body>

<!-- GAME -->
<div id="gameArea">
  <div id="ui">STATE: IDLE</div>
  <canvas id="game"></canvas>
</div>

<!-- CAMERA -->
<div id="camArea">
  <video id="video" autoplay playsinline></video>
  <canvas id="camCanvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

//////////////////////////////
// GAME SETUP
//////////////////////////////
const g = document.getElementById("game");
const gctx = g.getContext("2d");

g.width = window.innerWidth * 0.65;
g.height = window.innerHeight;

let player = {
  lane: 1,
  y: g.height - 140,
  jumping: false
};

const lanes = [
  g.width / 3,
  g.width / 2,
  g.width * 2 / 3
];

function drawGame(){
  gctx.clearRect(0,0,g.width,g.height);

  gctx.strokeStyle = "#444";
  gctx.beginPath();
  gctx.moveTo(0, g.height - 100);
  gctx.lineTo(g.width, g.height - 100);
  gctx.stroke();

  gctx.fillStyle = "lime";
  gctx.beginPath();
  gctx.arc(lanes[player.lane], player.y, 25, 0, Math.PI*2);
  gctx.fill();

  requestAnimationFrame(drawGame);
}
drawGame();

//////////////////////////////
// CAMERA SETUP
//////////////////////////////
const video = document.getElementById("video");
const camCanvas = document.getElementById("camCanvas");
const cctx = camCanvas.getContext("2d");

camCanvas.width = window.innerWidth * 0.35;
camCanvas.height = window.innerHeight;

function drawCam(){
  cctx.save();
  cctx.translate(camCanvas.width,0);
  cctx.scale(-1,1);
  cctx.drawImage(video,0,0,camCanvas.width,camCanvas.height);
  cctx.restore();
}

function drawPoints(lm){
  cctx.fillStyle = "red";
  [11,12,0].forEach(i=>{
    const p = lm[i];
    cctx.beginPath();
    cctx.arc(p.x*camCanvas.width,p.y*camCanvas.height,6,0,Math.PI*2);
    cctx.fill();
  });
}

//////////////////////////////
// STABLE AI SYSTEM
//////////////////////////////

let state = "IDLE";
let lastTrack = 0;

// smoothing
let smoothDiff = 0;
const ALPHA = 0.25;

// history filter
let history = [];
const HISTORY_SIZE = 5;

// single person lock
let locked = false;
let baseX = 0;
let baseY = 0;

function setState(s){
  if(state === s) return;

  state = s;
  document.getElementById("ui").innerText = "STATE: " + state;

  setTimeout(()=>{
    state = "IDLE";
    document.getElementById("ui").innerText = "STATE: IDLE";
  },300);
}

function classify(diff, noseY){
  const DEADZONE = 0.07;

  if(noseY < 0.35) return "JUMP";

  if(diff > DEADZONE) return "LEFT";
  if(diff < -DEADZONE) return "RIGHT";

  return "IDLE";
}

//////////////////////////////
// MAIN TRACKING
//////////////////////////////
function onResults(res){
  if(!res.poseLandmarks) return;

  const now = Date.now();
  if(now - lastTrack < 200) return;
  lastTrack = now;

  const lm = res.poseLandmarks;

  const nose = lm[0];
  const left = lm[11];
  const right = lm[12];

  // LOCK SINGLE PERSON
  if(!locked){
    baseX = nose.x;
    baseY = nose.y;
    locked = true;
  }

  // ignore others
  const dx = Math.abs(nose.x - baseX);
  const dy = Math.abs(nose.y - baseY);
  if(dx > 0.25 || dy > 0.25) return;

  drawCam();
  drawPoints(lm);

  // MIRROR SAFE
  let rawDiff = left.x - right.x;

  // SMOOTH
  smoothDiff = smoothDiff * (1 - ALPHA) + rawDiff * ALPHA;

  const newState = classify(smoothDiff, nose.y);

  // HISTORY FILTER
  history.push(newState);
  if(history.length > HISTORY_SIZE) history.shift();

  let counts = {LEFT:0, RIGHT:0, IDLE:0, JUMP:0};

  history.forEach(s => counts[s]++);

  let finalState = Object.keys(counts).reduce((a,b)=>
    counts[a] > counts[b] ? a : b
  );

  setState(finalState);

  // GAME CONTROL
  if(finalState === "LEFT") player.lane = 0;
  if(finalState === "RIGHT") player.lane = 2;
  if(finalState === "IDLE") player.lane = 1;

  if(finalState === "JUMP" && !player.jumping){
    player.jumping = true;
    player.y -= 120;

    setTimeout(()=>{
      player.y = g.height - 140;
      player.jumping = false;
    },450);
  }
}

//////////////////////////////
// MEDIA PIPE
//////////////////////////////
const pose = new Pose({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

pose.onResults(onResults);

const camera = new Camera(video,{
  onFrame: async ()=>{
    await pose.send({image:video});
  },
  width:640,
  height:480
});

camera.start();

</script>

</body>
</html>
