<!DOCTYPE html>
<html>
<head>
  <title>Motion Runner AI - Live Track</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: #000;
      display: flex;
    }

    /* ===== LEFT: GAME ===== */
    #gameContainer {
      width: 66.66%;
      height: 100vh;
      position: relative;
      background: #111;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* ===== RIGHT: CAMERA ===== */
    #cameraContainer {
      width: 33.33%;
      height: 100vh;
      position: relative;
      background: black;
      border-left: 2px solid #333;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: white;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 8px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <!-- ================= GAME SIDE ================= -->
  <div id="gameContainer">
    <div id="ui">Motion Runner AI<br>0.2s tracking</div>
    <canvas id="game"></canvas>
  </div>

  <!-- ================= CAMERA SIDE ================= -->
  <div id="cameraContainer">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    // ================= GAME =================
    const gameCanvas = document.getElementById("game");
    const gctx = gameCanvas.getContext("2d");

    gameCanvas.width = window.innerWidth * 0.66;
    gameCanvas.height = window.innerHeight;

    let player = {
      lane: 1,
      y: gameCanvas.height - 150,
      jumping: false
    };

    const lanes = [
      gameCanvas.width / 3,
      gameCanvas.width / 2,
      gameCanvas.width * 2 / 3
    ];

    function drawGame() {
      gctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

      // ground
      gctx.strokeStyle = "#444";
      gctx.beginPath();
      gctx.moveTo(0, gameCanvas.height - 100);
      gctx.lineTo(gameCanvas.width, gameCanvas.height - 100);
      gctx.stroke();

      // player
      gctx.fillStyle = "lime";
      gctx.beginPath();
      gctx.arc(lanes[player.lane], player.y, 25, 0, Math.PI * 2);
      gctx.fill();

      requestAnimationFrame(drawGame);
    }

    drawGame();

    // ================= CAMERA =================
    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const octx = overlay.getContext("2d");

    overlay.width = window.innerWidth * 0.33;
    overlay.height = window.innerHeight;

    // ================= TRACK CONTROL =================
    let lastTrackTime = 0;
    const TRACK_INTERVAL = 200;

    function drawPose(lm) {
      octx.clearRect(0, 0, overlay.width, overlay.height);

      const points = [11, 12, 0]; // shoulders + nose

      octx.fillStyle = "red";

      for (let i of points) {
        const p = lm[i];
        octx.beginPath();
        octx.arc(p.x * overlay.width, p.y * overlay.height, 5, 0, Math.PI * 2);
        octx.fill();
      }
    }

    function onResults(results) {
      if (!results.poseLandmarks) return;

      const now = Date.now();
      if (now - lastTrackTime < TRACK_INTERVAL) return;
      lastTrackTime = now;

      const lm = results.poseLandmarks;

      drawPose(lm);

      const left = lm[11];
      const right = lm[12];
      const nose = lm[0];

      const diff = left.x - right.x;

      // LEFT RIGHT
      if (diff > 0.12) player.lane = 0;
      else if (diff < -0.12) player.lane = 2;
      else player.lane = 1;

      // JUMP
      if (nose.y < 0.35 && !player.jumping) {
        player.jumping = true;
        player.y -= 120;

        setTimeout(() => {
          player.y = gameCanvas.height - 150;
          player.jumping = false;
        }, 450);
      }
    }

    // ================= MEDIAPIPE =================
    const pose = new Pose({
      locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    pose.onResults(onResults);

    const cam = new Camera(video, {
      onFrame: async () => {
        await pose.send({ image: video });
      },
      width: 640,
      height: 480
    });

    cam.start();
  </script>
</body>
</html>
